<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandBee UK — 90-Day Market Entry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1117; }
    .viewer { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    .nav { height: 48px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 16px; flex-shrink: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .nav button { background: #333; color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 500; cursor: pointer; min-height: 36px; touch-action: manipulation; }
    .nav button:hover { background: #555; }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .counter { color: #aaa; font-size: 14px; font-weight: 500; min-width: 70px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .viewport { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .scaler { width: 960px; height: 540px; transform-origin: center center; flex-shrink: 0; }
    .scaler iframe { width: 960px; height: 540px; border: none; display: block; }
  </style>
</head>
<body>
<div class="viewer">
  <div class="nav">
    <button id="prev" disabled>← Prev</button>
    <span class="counter" id="counter">1 / 23</span>
    <button id="next">Next →</button>
    <span style="width:1px;height:24px;background:#444;margin:0 4px;"></span>
    <button id="zoom-out">−</button>
    <span class="counter" id="zoom-label">100%</span>
    <button id="zoom-in">+</button>
  </div>
  <div class="viewport" id="viewport">
    <div class="scaler" id="scaler">
      <iframe id="frame" src="./slide-01.html" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>
</div>
<script>
  const TOTAL = 23;
  let current = 1;
  const frame    = document.getElementById('frame');
  const counter  = document.getElementById('counter');
  const btnPrev  = document.getElementById('prev');
  const btnNext  = document.getElementById('next');
  const scaler   = document.getElementById('scaler');
  const viewport = document.getElementById('viewport');

  function pad(n) { return String(n).padStart(2, '0'); }

  function goTo(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    if (n === current) return;
    current = n;
    frame.src = './slide-' + pad(n) + '.html';
    counter.textContent = current + ' / ' + TOTAL;
    btnPrev.disabled = current === 1;
    btnNext.disabled = current === TOTAL;
  }

  btnPrev.addEventListener('click', () => { goTo(current - 1); document.body.focus(); });
  btnNext.addEventListener('click', () => { goTo(current + 1); document.body.focus(); });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); goTo(current - 1); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(1); }
    else if (e.key === 'End')  { e.preventDefault(); goTo(TOTAL); }
  });

  let zoomLevel = 1.25;
  const zoomLabel = document.getElementById('zoom-label');
  zoomLabel.textContent = '125%';

  function rescale() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const base = Math.min(vw / 960, vh / 540) * 0.95;
    scaler.style.transform = 'scale(' + (base * zoomLevel) + ')';
  }
  window.addEventListener('resize', rescale);
  rescale();

  document.getElementById('zoom-in').addEventListener('click', () => {
    zoomLevel = Math.min(3.0, +(zoomLevel + 0.25).toFixed(2));
    zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
    rescale();
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    zoomLevel = Math.max(0.5, +(zoomLevel - 0.25).toFixed(2));
    zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
    rescale();
  });

  let touchStartX = 0, touchStartY = 0;
  viewport.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  viewport.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0) goTo(current + 1); else goTo(current - 1);
    }
  }, { passive: true });
</script>
</body>
</html>
