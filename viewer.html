<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .viewer-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Navigation bar */
    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 44px;
      min-height: 36px;
      touch-action: manipulation;
    }

    .nav-bar button:hover {
      background: #555;
    }

    .nav-bar button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .btn-fullscreen {
      position: absolute;
      right: 16px;
      background: transparent !important;
      font-size: 18px;
      padding: 6px 10px !important;
    }

    /* Slide viewport */
    .slide-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .slide-scaler {
      width: 720pt;
      height: 405pt;
      position: relative;
      transform-origin: center center;
    }

    /* Slide frames (iframes) */
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 720pt;
      height: 405pt;
      border: none;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <!-- Navigation -->
    <div class="nav-bar">
      <button id="btn-prev" title="Previous (\u2190)">Prev</button>
      <span class="slide-counter" id="counter">1 / 23</span>
      <button id="btn-next" title="Next (\u2192)">Next</button>
      <button class="btn-fullscreen" id="btn-fs" title="Fullscreen (F)">&#x26F6;</button>
    </div>

    <!-- Slide viewport -->
    <div class="slide-viewport" id="viewport">
      <div class="slide-scaler" id="scaler">

    if (!element || element.nodeType !== Node.ELEMENT_NODE) return '';

  function warn(message, detail) {

  }

    const target = event.target;
    if (!(target instanceof HTMLImageElement)) return;
    const src = (target.getAttribute('src') || target.currentSrc || '').trim();

    if (src.startsWith(localAssetPrefix)) {

        continue;

      if (absolutePathRe.test(src) || src.startsWith('/')) {
        fail('non-portable image path is unsupported', { src });
        continue;
      }
      if (!src.startsWith(localAssetPrefix)) {

      fail('non-body background-image is not supported for slide content', {

  });

      <p style=&quot;font-size:8.5pt; color:#e2e8f0; line-height:1.55;&quot;>My first step is to understand the other team's priorities before advocating for mine. In most priority conflicts, both teams are rational — they just have different success metrics. I build a business impact comparison: here is the revenue impact of my request, here is what I understand the impact of your request to be. I propose an urgency tagging system: Blocker (resolves within 24 hours), 3-Day (business impact materialising within 72 hours), Low (important but not time-sensitive). I frame all asks as joint efforts: &quot;What would it take to move this forward together?&quot; — not &quot;Why is this blocked?&quot; I escalate only if the business impact is demonstrably significant and the conversation has stalled.</p>

  <p style=&quot;font-size:9pt; color:#9ca3af; margin-top:2pt;&quot;>The right questions reveal operating principles. Click each to expand the full answer.</p>

<!-- Q&amp;A Accordion -->
<div style=&quot;padding:0 32pt;&quot;>

  <details id=&quot;q1&quot;>
    <summary>
      <span class=&quot;q-label&quot;>Q1</span>
      <span class=&quot;q-title&quot;>Strategic Disagreement with Leadership</span>
    </summary>
    <div class=&quot;q-body&quot;>
      <p>My first step is always to seek genuine understanding. Leadership often has context that is not visible from my vantage point: board commitments, runway constraints, regulatory requirements, partnership obligations. If I go into the conversation assuming I am right and they are wrong, I will have already lost the most important part of the exchange - the ability to learn something that might change my view.</p>
      <p>If, after understanding the full context, I still disagree, I prepare a structured counter-proposal. Not a complaint - a proposal. I quantify the expected business impact of both directions: &quot;Under the current plan, my model projects X outcome. Under the alternative approach, I project Y outcome. The difference is Z.&quot; I present this in writing, with supporting data, and request a specific decision meeting - not a hallway conversation.</p>
      <p>If leadership reviews both positions and proceeds with their original plan, I commit fully to executing it. I will not hedge, slow-roll, or run the experiment I preferred in parallel without authorization. Fractional commitment to a direction is the fastest way to guarantee it fails, which helps no one.</p>
      <p>What I do insist on, before execution begins, is establishing clear pre-agreed KPIs with milestones: &quot;We'll know by Day 30 whether this is working based on these specific numbers.&quot; This protects both parties. If the decision turns out to be correct, it gets credit. If it turns out to be wrong, the measurement framework lets us course-correct quickly rather than after six months of sunk cost.</p>
    </div>
  </details>

  <details id=&quot;q2&quot;>
    <summary>
      <span class=&quot;q-label&quot;>Q2</span>
      <span class=&quot;q-title&quot;>The 70% Budget Cut</span>
    </summary>
    <div class=&quot;q-body&quot;>
      <p>My first action is to immediately stop all experimental and exploratory channels. TikTok Spark Ads and the broad Meta campaigns are suspended first - they have the highest uncertainty and the longest payback cycles. I retain Google UAC for the Gaming vertical only: it is the highest-intent channel, the most measurable in near-real-time, and the one with the clearest direct path from install to partner revenue.</p>
      <p>I stop all non-essential A/B tests. With a 70% budget cut, I cannot afford to learn slowly. I focus 100% of the reduced budget on the single vertical and creative direction that has the highest probability of hitting the D7 ROAS threshold.</p>
      <p>I lean hard into organic growth levers that are free: ASO optimization (title, screenshots, description, keyword targeting) has high ROI and zero marginal cost. If we can improve Play Store conversion rate by 20%, that is effectively free installs that stretch the remaining budget further.</p>
      <p>I introduce faster campaign pausing criteria. With limited runway, every underperforming campaign must be paused within 72 hours, not 7 days. The optimization cadence doubles in frequency. Data is reviewed daily, not weekly.</p>
      <p>Finally, I communicate the budget change transparently to the team with a revised success framework. A 70% budget cut changes what &quot;success&quot; looks like for this launch. I align with leadership on adjusted targets immediately so the team is not measured against a plan that no longer reflects reality.</p>
    </div>
  </details>

  <details id=&quot;q3&quot;>
    <summary>
      <span class=&quot;q-label&quot;>Q3</span>
      <span class=&quot;q-title&quot;>The One Question Before Taking This Role</span>
    </summary>
    <div class=&quot;q-body&quot;>
      <p class=&quot;pullquote&quot;>&quot;How exactly do you define and measure success for this specific activity - and what are the mathematical targets we must hit before we consider the launch a win?&quot;</p>
      <p>The reason this is the single most important question is that without pre-agreed, measurable, specific targets established before the activity begins, &quot;success&quot; becomes whatever leadership remembers it was supposed to be after the fact. This is the single most common source of misaligned expectations between Growth teams and executive leadership - and it produces genuinely good work being judged as failure, or genuinely poor work being called a success because the measurement criteria were vague.</p>
      <p>Getting alignment on mathematical targets before Day 1 protects the team, protects the strategy, and creates the conditions for an honest 90-day evaluation. If the targets are met, the case for Phase 2 investment is self-evident. If they are not met, the conversation is about the numbers - not about opinions.</p>
    </div>
  </details>

</div>

  <script>
    const TOTAL = 23;
    let current = 1;

    const frames = document.querySelectorAll('.slide-frame');
    const counter = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const scaler = document.getElementById('scaler');
    const viewport = document.getElementById('viewport');

    function goTo(n) {
      n = Math.max(1, Math.min(TOTAL, n));
      if (n === current) return;
      frames[current - 1].classList.remove('active');
      current = n;
      frames[current - 1].classList.add('active');
      counter.textContent = current + ' / ' + TOTAL;
      btnPrev.disabled = current === 1;
      btnNext.disabled = current === TOTAL;
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    btnPrev.addEventListener('click', prev);
    btnNext.addEventListener('click', next);
    btnPrev.disabled = true;

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === 'Home') { e.preventDefault(); goTo(1); }
      else if (e.key === 'End') { e.preventDefault(); goTo(TOTAL); }
      else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      }
    });

    // Fullscreen
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }
    document.getElementById('btn-fs').addEventListener('click', toggleFullscreen);

    // Auto-scale to fit viewport (95% fit)
    function rescale() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const slideW = scaler.offsetWidth;
      const slideH = scaler.offsetHeight;
      const scale = Math.min(vw / slideW, vh / slideH) * 0.95;
      scaler.style.transform = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', rescale);
    document.addEventListener('fullscreenchange', () => setTimeout(rescale, 100));
    rescale();

    // Touch swipe navigation
    let touchStartX = 0;
    let touchStartY = 0;
    viewport.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    viewport.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });
  </script>
